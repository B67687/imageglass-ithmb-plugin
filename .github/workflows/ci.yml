# ci.yml — Build + clippy + security advisory + package .igplugin.zip artifacts.
name: ci
on:
  push: { branches: [main], tags: ['v*'] }
  pull_request: { branches: [main] }
permissions: { contents: read }

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            pkg_tag: linux
          - os: macos-latest
            pkg_tag: macos
          - os: windows-latest
            pkg_tag: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-key: "plugin-rust-${{ matrix.os }}"
      - name: Build
        run: cargo build --release
      - name: Verify symbol export
        shell: bash
        if: runner.os != 'Windows'
        run: |
          if nm -D target/release/lib*.so 2>/dev/null; then
            nm -D target/release/lib*.so 2>/dev/null | grep -q ig_plugin_get_api && echo "Symbol verified" || echo "Missing symbol!"
          fi
      - name: Package .igplugin.zip
        id: package
        shell: bash
        run: |
          bash scripts/package.sh "${{ matrix.pkg_tag }}"
          echo "artifact-name=ithmb-codec-${{ matrix.pkg_tag }}.igplugin.zip" >> "$GITHUB_OUTPUT"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ithmb-codec-${{ matrix.pkg_tag }}.igplugin.zip
          path: dist/*.igplugin.zip
  verify_clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: true
          cache-key: "plugin-clippy"
      - name: cargo clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  verify_deny:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-key: "plugin-deny"
      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          pattern: ithmb-codec-*
          merge-multiple: true
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Imageglass-Ithmb-Plugin ${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            *.igplugin.zip
        env:
          GH_TOKEN: ${{ github.token }}
